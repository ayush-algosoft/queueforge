# QueueForge — local development / verification stack.
#
# Brings up Kafka (KRaft mode, no Zookeeper), Postgres, Redis, Prometheus,
# Grafana, and every QueueForge service. Health checks gate each service
# behind the infrastructure it depends on so `docker compose up` produces a
# coherent, ready-to-use environment in one shot.

name: queueforge

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: queueforge-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # PLAINTEXT exposes the broker to other containers via the docker
      # network DNS name; PLAINTEXT_HOST exposes it to the host on 9092 for
      # local tools (psql-style scripts, the integration test suite).
      KAFKA_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Topics are created explicitly on API startup via EnsureTopics, so
      # broker-side auto-creation is left off.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "qf-cluster-0000000000000001"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:19092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: queueforge-postgres
    environment:
      POSTGRES_USER: queueforge
      POSTGRES_PASSWORD: queueforge
      POSTGRES_DB: queueforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queueforge -d queueforge"]
      interval: 3s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: queueforge-redis
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE: api
    container_name: queueforge-api
    depends_on:
      kafka:      { condition: service_healthy }
      postgres:   { condition: service_healthy }
      redis:      { condition: service_healthy }
    environment: &qf-env
      QF_ENV: development
      QF_LOG_LEVEL: info
      QF_LOG_PRETTY: "false"
      QF_POSTGRES_DSN: postgres://queueforge:queueforge@postgres:5432/queueforge?sslmode=disable
      QF_KAFKA_BROKERS: kafka:19092
      QF_REDIS_ADDR: redis:6379
      QF_HTTP_ADDR: ":8080"
      QF_METRICS_ADDR: ":9090"
    ports:
      - "8080:8080"
      - "9090:9090"

  scheduler:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE: scheduler
    container_name: queueforge-scheduler
    depends_on:
      api: { condition: service_started }
    environment:
      <<: *qf-env
      QF_METRICS_ADDR: ":9091"
    ports:
      - "9091:9091"

  worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE: worker
    container_name: queueforge-worker
    depends_on:
      api: { condition: service_started }
    environment:
      <<: *qf-env
      QF_METRICS_ADDR: ":9192"
      QF_WORKER_CONCURRENCY: "8"
      QF_WORKER_PRIORITIES: "P0,P1,P2,P3"
    ports:
      - "9192:9192"

  recovery:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE: recovery
    container_name: queueforge-recovery
    depends_on:
      api: { condition: service_started }
    environment:
      <<: *qf-env
      QF_METRICS_ADDR: ":9093"
    ports:
      - "9093:9093"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: queueforge-prometheus
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9094:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.0
    container_name: queueforge-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: queueforge
    volumes:
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  kafka-data:
  postgres-data:
